_base_: default.yaml

model:
  NAME: BaseCls
  encoder_args:
    NAME: PointNextEncoder
    blocks: [1, 2, 3, 2, 2, 1]
    strides: [1, 2, 2, 2, 2, 1]
    width: 32
    in_channels: 9
    sa_layers: 2
    sa_use_res: True
    radius: 0.15
    radius_scaling: 1.5
    nsample: 32
    expansion: 4
    aggr_args:
      feature_type: 'dp_fj'
      reduction: 'max'
    group_args:
      NAME: 'ballquery'
      normalize_dp: True
    conv_args:
      order: conv-norm-act
    act_args:
      act: 'relu'
    norm_args:
      norm: 'bn'
  cls_args:
    NAME: ClsHead
    num_classes: 2
    mlps: [512, 256]
    norm_args:
      norm: 'bn1d'

wandb:
  use_wandb: True
  tags: [pointnext-b, breakingbad, enriched, 9D]
