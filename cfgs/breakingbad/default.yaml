# ============================================================================ #
# Breaking Bad Binary Classification — default config
# Classes:  0 = complete,  1 = broken
# ============================================================================ #

# ---------------------------------------------------------------------------- #
# Dataset
# ---------------------------------------------------------------------------- #
dataset:
  common:
    NAME: BreakingBadCls
    data_dir: ../../data/bb_classification   # 9D enriched directory
    num_points: 8192
    enriched: True
  train:
    split: train
  val:
    split: val

num_points: 8192
num_classes: &nclass
  2

feature_keys: pos

# ---------------------------------------------------------------------------- #
# Data augmentation
# ---------------------------------------------------------------------------- #
datatransforms:
  train: [PointsToTensor, PointCloudScaling, PointCloudCenterAndNormalize, PointCloudRotation, RandomJitter]
  val:   [PointsToTensor, PointCloudCenterAndNormalize]
  kwargs:
    scale:       [0.8, 1.2]
    angle:       [0.0, 1.0, 0.0]
    gravity_dim: 1
    jitter_sigma: 0.01
    jitter_clip: 0.05

# ---------------------------------------------------------------------------- #
# DataLoader
# ---------------------------------------------------------------------------- #
batch_size:     16
val_batch_size: 16
step_per_update: 2   # Gradient Accumulation to maintain effective batch size of 32
dataloader:
  num_workers: 4
  use_balanced_sampler: True   # CRITICAL for Breaking Bad

# ---------------------------------------------------------------------------- #
# Loss
# ---------------------------------------------------------------------------- #
criterion_args:
  NAME: LabelSmoothingCrossEntropy
  label_smoothing: 0.1
  weight: [1.0, 1.0]

# ---------------------------------------------------------------------------- #
# Optimizer & scheduler
# ---------------------------------------------------------------------------- #
lr: 0.001
optimizer:
  NAME: adamw
  weight_decay: 0.05

sched:         cosine
epochs:        300
warmup_epochs: 20
min_lr:        1.0e-6

grad_norm_clip: 10

# ---------------------------------------------------------------------------- #
# io and misc
# ---------------------------------------------------------------------------- #
log_dir: breakingbad
print_freq: 50
val_freq:   1

pretrained_path: null

wandb:
  use_wandb: True
  project: PointNeXt-Fracture-Classification
  entity: null
  tags: [pointnext-b, breakingbad, enriched, 9D]
