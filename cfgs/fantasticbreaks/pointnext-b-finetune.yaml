# BB -> FB Transfer Learning config
# Load BB best checkpoint and finetune on FB

# ---------------------------------------------------------------------------- #
# Model Architecture (PointNeXt-B)
# ---------------------------------------------------------------------------- #
model:
  NAME: BaseCls
  encoder_args:
    NAME: PointNextEncoder
    blocks: [1, 2, 3, 2, 2, 1]     # B variant
    strides: [1, 2, 2, 2, 2, 1]
    width: 32                      # B variant width
    in_channels: 9                 # XYZ(3)+nx,ny,nz(3)+density,variation,entropy(3)
    sa_layers: 2
    sa_use_res: True
    radius: 0.15
    radius_scaling: 1.5
    nsample: 32
    expansion: 4
    aggr_args:
      feature_type: 'dp_fj'
      reduction: 'max'
    group_args:
      NAME: 'ballquery'
      normalize_dp: True
    conv_args:
      order: conv-norm-act
    act_args:
      act: 'relu'
    norm_args:
      norm: 'bn'
  cls_args:
    NAME: ClsHead
    num_classes: 2                 # 0 = complete, 1 = broken
    mlps: [512, 256]
    norm_args:
      norm: 'bn1d'

# ---------------------------------------------------------------------------- #
# Fine-tuning Settings
# ---------------------------------------------------------------------------- #
mode: finetune 
pretrained_path: null   # set via CLI

freeze_epochs: 20       # Experiment B default
epochs: 100
warmup_epochs: 5
lr: 0.0005              # Lower LR for finetuning

# ---------------------------------------------------------------------------- #
# Single GPU Optimization
# ---------------------------------------------------------------------------- #
batch_size: 16
val_batch_size: 16
step_per_update: 1
sync_bn: False

wandb:
  use_wandb: True
  tags: [pointnext-b, fantasticbreaks, transfer-bb2fb, 9D]
