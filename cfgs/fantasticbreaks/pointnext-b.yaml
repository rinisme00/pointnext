_base_: default.yaml
# PointNeXt-B for Fantastic Breaks binary classification (enriched features)
# Same architecture as Breaking Bad PointNeXt-B for consistent comparison
# Optimized for Single GPU (RTX 3090 24GB)
#
# Train from scratch:
#   CUDA_VISIBLE_DEVICES=0 python examples/classification/main.py \
#       --cfg cfgs/fantasticbreaks/pointnext-b.yaml
#
# Finetune from BB pretrained:
#   CUDA_VISIBLE_DEVICES=0 python examples/classification/main.py \
#       --cfg cfgs/fantasticbreaks/pointnext-b.yaml \
#       mode=finetune \
#       pretrained_path=log/breakingbad/<run_name>/checkpoint/<run_name>_ckpt_best.pth

model:
  NAME: BaseCls
  encoder_args:
    NAME: PointNextEncoder
    blocks: [1, 2, 3, 2, 2, 1]     # B variant (matches BB config exactly)
    strides: [1, 2, 2, 2, 2, 1]
    width: 32                      # B variant width
    in_channels: 9                 # XYZ(3)+nx,ny,nz(3)+density,variation,entropy(3)
    sa_layers: 2
    sa_use_res: True
    radius: 0.15
    radius_scaling: 1.5
    nsample: 32
    expansion: 4
    aggr_args:
      feature_type: 'dp_fj'
      reduction: 'max'
    group_args:
      NAME: 'ballquery'
      normalize_dp: True
    conv_args:
      order: conv-norm-act
    act_args:
      act: 'relu'
    norm_args:
      norm: 'bn'
  cls_args:
    NAME: ClsHead
    num_classes: 2                 # 0 = complete, 1 = broken
    mlps: [512, 256]
    norm_args:
      norm: 'bn1d'

# ---------------------------------------------------------------------------- #
# Single GPU Optimization Overrides
# ---------------------------------------------------------------------------- #
# FB is smaller (240 train) so we can use larger batch_size safely
batch_size: 16
val_batch_size: 16
step_per_update: 1
sync_bn: False

lr: 0.001                         # Slightly lower than BB due to smaller dataset
optimizer:
  NAME: adamw
  weight_decay: 0.05

wandb:
  use_wandb: True
  tags: [pointnext-b, fantasticbreaks, enriched, single-gpu]
