# ============================================================================ #
# FantasticBreaks Binary Classification — default config
# Classes:  0 = complete,  1 = broken
# Dataset:  240 train / 60 test  (perfectly balanced)
# ============================================================================ #

# ---------------------------------------------------------------------------- #
# Dataset
# ---------------------------------------------------------------------------- #
dataset:
  common:
    NAME: FantasticBreaksCls
    data_dir: ../../data/fb_classification   # new 9D enriched directory
    num_points: 8192                # points subsampled per sample at runtime
    enriched: True                  # load *_data_enriched.h5 ([B, N, 9] features)
  train:
    split: train
  val:
    split: test

num_points: 8192    # points passed into the model
num_classes: &nclass
  2

feature_keys: pos   # pos = XYZ; geometric features added by adapter (total 9D)

# ---------------------------------------------------------------------------- #
# Data augmentation
# ---------------------------------------------------------------------------- #
datatransforms:
  train: [PointsToTensor, PointCloudScaling, PointCloudCenterAndNormalize, PointCloudRotation, RandomJitter]
  val:   [PointsToTensor, PointCloudCenterAndNormalize]
  kwargs:
    scale:       [0.8, 1.2]
    angle:       [0.0, 1.0, 0.0]   # rotate around Y axis only
    gravity_dim: 1
    jitter_sigma: 0.01
    jitter_clip: 0.05

# ---------------------------------------------------------------------------- #
# DataLoader
# ---------------------------------------------------------------------------- #
batch_size:     16
val_batch_size: 16
dataloader:
  num_workers: 8
  use_balanced_sampler: True

# ---------------------------------------------------------------------------- #
# Loss
# ---------------------------------------------------------------------------- #
criterion_args:
  NAME: LabelSmoothingCrossEntropy
  label_smoothing: 0.1
  weight: [1.0, 1.0]

# ---------------------------------------------------------------------------- #
# Optimizer & scheduler
# ---------------------------------------------------------------------------- #
lr: 0.001
optimizer:
  NAME: adamw
  weight_decay: 0.05

sched:         cosine
epochs:        300
warmup_epochs: 20
min_lr:        1.0e-6

grad_norm_clip: 10

# ---------------------------------------------------------------------------- #
# io and misc
# ---------------------------------------------------------------------------- #
log_dir: fantasticbreaks
print_freq: 10
val_freq:   1

pretrained_path: null

wandb:
  use_wandb: True
  project: PointNeXt-Fracture-Classification
  entity: null
  tags: [pointnext-b, fantasticbreaks, enriched, 9D]
